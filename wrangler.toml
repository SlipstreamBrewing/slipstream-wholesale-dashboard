# Cloudflare Worker config for the Slipstream Brewing Wholesale dashboard.
# `name` sets the URL (https://<name>.<subdomain>.workers.dev) and MUST match
# the GitHub repo name before the first push.
name = "slipstream-wholesale-dashboard"
main = "worker.js"
compatibility_date = "2025-07-01"

# Token + data store. With no id set, Cloudflare auto-provisions this KV
# namespace on the first Workers Build and links it to the Worker (needs
# wrangler >= 4.45). AFTER the first successful deploy, pin the generated id
# here (read it from the Cloudflare dashboard) so later deploys always reuse the
# same store and never orphan the saved password/tokens.
[[kv_namespaces]]
binding = "TOKENS"

# Serve the dashboard page as text bundled with the Worker.
[[rules]]
type = "Text"
globs = ["dashboard.html"]

# --- Secrets set in the Cloudflare dashboard (Settings > Variables and Secrets),
#     never in this repo ---
#   XERO_CLIENT_ID       Xero app client id
#   XERO_CLIENT_SECRET   Xero app client secret
#   INGEST_TOKEN         the owner's "upload code" for Beer30 export drops
#   (SESSION_SECRET and the dashboard password hash generate themselves in KV;
#    never set them.)

# Beer30 scheduled-pull hook (rung 2). Uncomment when a stable export URL is wired.
# [triggers]
# crons = [